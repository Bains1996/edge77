<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1080px; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #0a0a0a; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 80px; overflow: hidden; }
.logo { font-size: 28px; font-weight: 800; position: absolute; top: 60px; left: 80px; }
.logo span { color: #3b82f6; }
h1 { font-size: 48px; font-weight: 800; line-height: 1.15; margin-bottom: 24px; max-width: 800px; }
h1 em { font-style: normal; color: #3b82f6; }
.sub { font-size: 22px; color: #94a3b8; margin-bottom: 48px; max-width: 700px; }
.stats { display: flex; gap: 48px; margin-bottom: 48px; }
.stat { text-align: center; }
.stat-num { font-size: 48px; font-weight: 900; color: #22c55e; }
.stat-label { font-size: 14px; color: #64748b; text-transform: uppercase; letter-spacing: 2px; margin-top: 4px; }
.cta { background: #3b82f6; color: white; padding: 18px 44px; border-radius: 12px; font-size: 20px; font-weight: 700; }
.sub-cta { font-size: 14px; color: #64748b; margin-top: 16px; }
</style>
</head>
<body>
<div class="logo">EDGE<span>77</span></div>
<h1>Month 1 <em>Results</em></h1>
<p class="sub">What our customers recovered in their first 30 days</p>
<div class="stats">
  <div class="stat"><div class="stat-num">2,847</div><div class="stat-label">Invoices Audited</div></div>
  <div class="stat"><div class="stat-num">1,203</div><div class="stat-label">Errors Caught</div></div>
  <div class="stat"><div class="stat-num">94%</div><div class="stat-label">Dispute Success</div></div>
</div>
<div class="cta">Get Your Free Audit →</div>
<p class="sub-cta">No credit card required</p>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1080px; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f172a 100%); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 80px; overflow: hidden; }
.logo { font-size: 32px; font-weight: 800; margin-bottom: 48px; }
.logo span { color: #3b82f6; }
.badge { background: rgba(139, 92, 246, 0.15); border: 1px solid rgba(139, 92, 246, 0.3); color: #a78bfa; padding: 12px 28px; border-radius: 100px; font-size: 16px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 40px; }
h1 { font-size: 52px; font-weight: 800; line-height: 1.15; margin-bottom: 16px; }
h1 em { font-style: normal; color: #a78bfa; }
.sub { font-size: 24px; color: #94a3b8; max-width: 700px; line-height: 1.5; margin-bottom: 48px; }
.commission { background: rgba(139, 92, 246, 0.1); border: 1px solid rgba(139, 92, 246, 0.25); border-radius: 24px; padding: 48px; width: 100%; max-width: 750px; margin-bottom: 48px; }
.commission-num { font-size: 96px; font-weight: 900; color: #a78bfa; line-height: 1; }
.commission-label { font-size: 24px; color: #cbd5e1; margin-top: 12px; }
.types { display: flex; gap: 24px; margin-bottom: 48px; }
.type { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 28px; width: 200px; text-align: center; }
.type-icon { font-size: 36px; margin-bottom: 12px; }
.type-text { font-size: 18px; font-weight: 700; }
.cta { background: #a78bfa; color: white; padding: 18px 44px; border-radius: 12px; font-size: 20px; font-weight: 700; }
</style>
</head>
<body>
<div class="logo">EDGE<span>77</span></div>
<div class="badge">Partner Program</div>
<h1>Earn <em>20% Recurring</em><br>Commission</h1>
<p class="sub">Refer freight shippers to EDGE77 and earn 20% of their subscription every month — for life.</p>
<div class="commission">
  <div class="commission-num">20%</div>
  <div class="commission-label">Recurring commission on every referral</div>
</div>
<div class="types">
  <div class="type"><div class="type-icon">🏢</div><div class="type-text">Freight Brokers</div></div>
  <div class="type"><div class="type-icon">📦</div><div class="type-text">3PLs</div></div>
  <div class="type"><div class="type-icon">💼</div><div class="type-text">Consultants</div></div>
</div>
<div class="cta">Become a Partner →</div>
</body>
</html>

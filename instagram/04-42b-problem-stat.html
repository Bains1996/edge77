<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1080px; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #0a0a0a; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; overflow: hidden; }
.logo { font-size: 32px; font-weight: 800; letter-spacing: -1px; position: absolute; top: 60px; left: 80px; }
.logo span { color: #3b82f6; }
.big-num { font-size: 180px; font-weight: 900; color: #ef4444; line-height: 1; margin-bottom: 24px; letter-spacing: -8px; }
.big-text { font-size: 48px; font-weight: 700; margin-bottom: 16px; }
.sub { font-size: 28px; color: #94a3b8; max-width: 700px; line-height: 1.5; margin-bottom: 64px; }
.source { font-size: 16px; color: #475569; font-style: italic; margin-bottom: 48px; }
.divider { width: 120px; height: 4px; background: #3b82f6; border-radius: 2px; margin-bottom: 48px; }
.cta { background: #3b82f6; color: white; padding: 18px 40px; border-radius: 12px; font-size: 20px; font-weight: 700; }
.corner { position: absolute; width: 160px; height: 160px; border: 2px solid rgba(239, 68, 68, 0.15); }
.corner-tl { top: 40px; left: 40px; border-right: none; border-bottom: none; }
.corner-br { bottom: 40px; right: 40px; border-left: none; border-top: none; }
</style>
</head>
<body>
<div class="corner corner-tl"></div>
<div class="corner corner-br"></div>
<div class="logo">EDGE<span>77</span></div>
<div class="big-num">$4.2B</div>
<div class="big-text">Lost to Freight Overcharges Every Year</div>
<p class="sub">87% of shippers don't audit their freight invoices. That's money left on the table — every single month.</p>
<div class="source">Source: Industry research, 2024</div>
<div class="divider"></div>
<div class="cta">Stop Overpaying →</div>
</body>
</html>

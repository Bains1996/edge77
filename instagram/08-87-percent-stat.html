<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1080px; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #0a0a0a; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; overflow: hidden; }
.logo { font-size: 32px; font-weight: 800; position: absolute; top: 60px; left: 80px; }
.logo span { color: #3b82f6; }
.big-num { font-size: 200px; font-weight: 900; color: #f97316; line-height: 1; letter-spacing: -8px; margin-bottom: 16px; }
.percent { font-size: 80px; font-weight: 900; color: #f97316; }
h1 { font-size: 48px; font-weight: 700; margin-top: 32px; margin-bottom: 24px; max-width: 800px; line-height: 1.2; }
.sub { font-size: 24px; color: #94a3b8; max-width: 700px; line-height: 1.5; margin-bottom: 48px; }
.reasons { display: flex; gap: 32px; margin-bottom: 48px; }
.reason { background: rgba(249, 115, 22, 0.08); border: 1px solid rgba(249, 115, 22, 0.2); border-radius: 16px; padding: 28px; width: 220px; text-align: center; }
.reason-icon { font-size: 36px; margin-bottom: 12px; }
.reason-text { font-size: 16px; color: #cbd5e1; line-height: 1.4; }
.cta { background: #3b82f6; color: white; padding: 18px 44px; border-radius: 12px; font-size: 20px; font-weight: 700; }
</style>
</head>
<body>
<div class="logo">EDGE<span>77</span></div>
<div class="big-num">87<span class="percent">%</span></div>
<h1>of Shippers Overpay on Freight — Every Month</h1>
<p class="sub">And most don't even know it. Here's why:</p>
<div class="reasons">
  <div class="reason">
    <div class="reason-icon">🔍</div>
    <div class="reason-text">No one audits invoices line by line</div>
  </div>
  <div class="reason">
    <div class="reason-icon">📊</div>
    <div class="reason-text">Carrier contracts are too complex to verify</div>
  </div>
  <div class="reason">
    <div class="reason-icon">⏰</div>
    <div class="reason-text">Teams are too busy to catch errors</div>
  </div>
</div>
<div class="cta">Let AI Handle It →</div>
</body>
</html>

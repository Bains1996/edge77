<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1080px; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; overflow: hidden; }
.badge { background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.3); color: #60a5fa; padding: 12px 32px; border-radius: 100px; font-size: 18px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 48px; }
.logo { font-size: 72px; font-weight: 800; letter-spacing: -2px; margin-bottom: 16px; }
.logo span { color: #3b82f6; }
h1 { font-size: 56px; font-weight: 700; line-height: 1.1; margin-bottom: 32px; max-width: 800px; }
h1 em { font-style: normal; color: #3b82f6; }
.sub { font-size: 24px; color: #94a3b8; max-width: 700px; line-height: 1.5; margin-bottom: 48px; }
.cta { background: #3b82f6; color: white; padding: 20px 48px; border-radius: 12px; font-size: 22px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
.stats { position: absolute; bottom: 80px; display: flex; gap: 64px; }
.stat { text-align: center; }
.stat-num { font-size: 42px; font-weight: 800; color: #3b82f6; }
.stat-label { font-size: 16px; color: #64748b; text-transform: uppercase; letter-spacing: 2px; margin-top: 8px; }
.corner { position: absolute; width: 200px; height: 200px; border: 2px solid rgba(59, 130, 246, 0.1); }
.corner-tl { top: 40px; left: 40px; border-right: none; border-bottom: none; }
.corner-br { bottom: 40px; right: 40px; border-left: none; border-top: none; }
</style>
</head>
<body>
<div class="corner corner-tl"></div>
<div class="corner corner-br"></div>
<div class="badge">Now Live</div>
<div class="logo">EDGE<span>77</span></div>
<h1>AI-Powered Freight Invoice Audit is Here</h1>
<p class="sub">Stop overpaying on freight invoices. Our AI catches every error, recovers every dollar, and files disputes automatically.</p>
<div class="cta">Start Free →</div>
<div class="stats">
  <div class="stat"><div class="stat-num">$4.2B</div><div class="stat-label">Lost Annually</div></div>
  <div class="stat"><div class="stat-num">87%</div><div class="stat-label">Shippers Overpay</div></div>
  <div class="stat"><div class="stat-num">30s</div><div class="stat-label">Audit Time</div></div>
</div>
</body>
</html>
